name: Gondola PR Review

# Runs an automated Venice-powered code review on every pull request and posts
# (or updates) a single review comment.
#
# Security: this uses pull_request_target so the review can run with repository
# secrets even for pull requests from forks. It is safe ONLY because it never
# checks out or executes the PR's code: it checks out the trusted base branch
# (for this workflow + the reviewer script) and reads the PR diff through the
# GitHub API. Do NOT add steps that check out the PR head, install its
# dependencies, or run its build/scripts here.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: gondola-review-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      # Checks out the trusted base branch (default for pull_request_target), not
      # the PR's code. This only provides the reviewer script.
      - name: Check out base branch
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Review the pull request
        env:
          VENICE_API_KEY: ${{ secrets.VENICE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.number }}
          VENICE_REVIEW_MODEL: ${{ vars.VENICE_REVIEW_MODEL }}
        run: node .github/scripts/review-pr.mjs
